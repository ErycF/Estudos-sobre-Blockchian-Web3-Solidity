            const web3 = new Web3('HTTP://127.0.0.1:7545');

            let transaction = {
                to: '0x038260e9ce0dd1297163178e5616215bb4d6faa5', // Endereço do contrato
                data: '0x17d7de7c' // Assinatura da função getName() , os 4 primeiros Bytes.
                // Como é uma call, não se coloca gás.
            };

            let receipt = await web3.eth.call(transaction);
            console.log(transaction);

        };
