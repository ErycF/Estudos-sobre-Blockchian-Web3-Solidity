        const web3 = new Web3(window.ethereum);

        // Abi do contrato

        // Endereço do contrato 
        const endereco = '0x485c87b1ab414F4a4E758990CB02EB693D4E00c9';

        // Pegando as informações do contrato
        const contrato = new web3.eth.Contract(abi,endereco);
        
        async function mineracao() {
            // O bloco foi Minerado?;
            let mineracao = await web3.eth.isMining();
            console.log('O bloco foi minerado?',mineracao);
            document.getElementById('mostra').innerHTML = mineracao;
        }
        document.getElementById('minerado').addEventListener('click',mineracao);

        async function blocoMinerado() {
            // Número ddo bloco minerado;
            let bMinerado = await web3.eth.getBlockNumber();
            console.log('O Número do bloco minerado:',bMinerado);
            document.getElementById('mostra').innerText = bMinerado;
        }
        document.getElementById('numeroBlock').addEventListener('click',blocoMinerado);

        async function estimaGas() {
            // Estimação do consumo de gás;
            let gas = await web3.eth.estimateGas();
            console.log('Estimação do gás:',gas);
            document.getElementById('mostra').innerText = gas;
        }
        document.getElementById('estimateGas').addEventListener('click',estimaGas);

                gas: '0x510345'
            };
            // A qauntidade de gás para essa transação;
            let gas = await web3.eth.estimateGas(transaction);
            console.log('Estimação do gás dessa transação:',gas);
            // O recipo da transação e tambem a transação;
            let receipt = await web3.eth.sendTransaction(transaction);
            console.log('O recipo do transação:',receipt);
            document.getElementById('mostra').innerText = 'Da F12 para ver o receipt.';
        }
        document.getElementById('transaction').addEventListener('click', transaction);

        async function conectar() {
            // Conectando com a MetaMesk, via RPC e proprio metodo da MetaMesk;
            let conectar = await ethereum.request({method: 'eth_requestAccounts'});
            console.log('Endereço que esta conectado',conectar);
        }
        document.getElementById('conectar').addEventListener('click',conectar);

        async function getName() {
            // Buscando nome (Uma call);
            let name = await contrato.methods.getName().call();
            console.log('Nome da variável:',name);
            document.getElementById('mostra').innerText = name;
        }
        document.getElementById('getName').addEventListener('click',getName);

        async function getAge() {
            // Busca idade (uma call);
            let age = await contrato.methods.getAge().call();
            console.log('Idade da variável',age);
            document.getElementById('mostra').innerText = age;
        }
        document.getElementById('getAge').addEventListener('click',getAge);

        async function setName() {
            // Escrever na variavel name;
            let name = await contrato.methods.setName('Eryc').send({from:'0xD0f422d7b240Ff96C2E09Aa57185940e146B188a'});
            console.log('Nome da variável:',name);
            document.getElementById('mostra').innerText = name;
        }
        document.getElementById('setName').addEventListener('click',setName);

        async function setAge() {
            // Escrever na variãvel age;
            let age = await contrato.methods.setage('19').send({from:'0xD0f422d7b240Ff96C2E09Aa57185940e146B188a'});
            console.log('Idade da variável:',age);
            document.getElementById('mostra').innerText = age;
        }
        document.getElementById('setAge').addEventListener('click',setAge);

        async function encode() {
            // Encode do nome Yashua;
            let encode = await contrato.methods.setName('Yashua').encodeABI();
            console.log('Endecode do nome Yashua:',encode);
            document.getElementById('mostra').innerText = encode;
        }
        document.getElementById('encode').addEventListener('click',encode);

        async function accounts() {
            // As contas conectadas;
            let contas = web3.eth.getAccounts();
            console.log('Contas que estão conectadas:',contas);
            document.getElementById('mostra').innerText = contas;
        }
        document.getElementById('accounts').addEventListener('click',accounts);

        async function rede() {
            // Rede conectada;
            let rede = await ethereum.request({method: 'eth_chainId'});
            console.log('Rede que esta conectada:',rede);
            document.getElementById('mostra').innerText = rede;
        }
        document.getElementById('rede').addEventListener('click',rede);

        async function contaConectada() {
            // Pegar a conta conectada;
            let contas = web3.eth.getAccounts();
            let conta = contas[0];
            console.log('Conta conectada:',conta);
            document.getElementById('mostra').innerText = conta;
        }
        document.getElementById('conta').addEventListener('click',contaConectada)
