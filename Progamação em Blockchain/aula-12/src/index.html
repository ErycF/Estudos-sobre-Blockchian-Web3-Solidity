<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 12 - Web 3</title>
    <script src="../node_modules/web3/dist/web3.min.js"></script>
</head>
<body>
    <button id="conectar">conectar com a Metamesk</button>
    <button id="getName">Pegar o nome</button>
    <button id="setName">Colocar nome</button>
    <button id="name">Name</button>
    <script>
        const web3 = new Web3(window.ethereum);
        
        var abi = [     {       "inputs": [],       "name": "name",       "outputs": [         {           "internalType": "string",           "name": "",           "type": "string"         }       ],       "stateMutability": "view",       "type": "function",       "constant": true     },     {       "inputs": [],       "name": "getName",       "outputs": [         {           "internalType": "string",           "name": "",           "type": "string"         }       ],       "stateMutability": "view",       "type": "function",       "constant": true     },     {       "inputs": [         {           "internalType": "string",           "name": "_name",           "type": "string"         }       ],       "name": "setName",       "outputs": [],       "stateMutability": "nonpayable",       "type": "function"     }   ];
        var endereco = '0xF46B0a399cBA819229D129D5f351b97e97B4B6a7';
        
        let contrato = new web3.eth.Contract(abi,endereco);

        async function conectar() {
            let conectar = await ethereum.request({method: 'eth_requestAccounts'});
            let contas = await web3.eth.getAccounts();
            web3.eth.getCode('0xF46B0a399cBA819229D129D5f351b97e97B4B6a7').then(console.log)
            console.log(conectar);
            console.log(contas);
        }

        async function getName(){
            let nome = await contrato.methods.getName().call();
            console.log(nome);
        }

        async function setName() {
            let contas = await web3.eth.getAccounts();
            let conta = contas[0];
            let nome = await contrato.methods.setName('Eryc').send({from: conta});
            console.log(nome);
        }

        async function name_string() {
            let name = await contrato.methods.name().call();
            console.log(name);
        }

        document.getElementById('conectar').addEventListener('click',conectar);
        document.getElementById('getName').addEventListener('click',getName);
        document.getElementById('setName').addEventListener('click',setName);
        document.getElementById('name').addEventListener('click',name_string);
    </script>

</body>
</html>
