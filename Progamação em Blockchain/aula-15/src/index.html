<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 14 - Web3</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@4.16.0/dist/web3.min.js"></script>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div {
            display: flex;
            justify-content: center;
            margin: 10px;
        }
        #btnConectar{
            display: none;
        }
    </style>
</head>
<body>
    <div id="conectar">
        <button id="btnConectar">Conectar ao MetaMask</button>
    </div>
    <div>
        Nome: <input id="inputName" type="text">
    </div>
    <div>
        <button id="alterar">Alterar Nome</button>
    </div>
    <div id="nome">&nbsp;</div>

    <script>
        // Usar const em vez de var (melhor prática)
        const provider = window.ethereum;
        let conta = null; // Para armazenar a conta atual

        const abi = [ 
            { "inputs": [], "name": "name", "outputs": [ { "internalType": "string", "name": "", "type": "string" } ], "stateMutability": "view", "type": "function", "constant": true }, 
            { "inputs": [], "name": "getName", "outputs": [ { "internalType": "string", "name": "", "type": "string" } ], "stateMutability": "view", "type": "function", "constant": true }, 
            { "inputs": [ { "internalType": "string", "name": "_name", "type": "string" } ], "name": "setName", "outputs": [], "stateMutability": "nonpayable", "type": "function" }, 
            { "inputs": [], "name": "getIdade", "outputs": [ { "internalType": "uint256", "name": "", "type": "uint256" } ], "stateMutability": "view", "type": "function", "constant": true }, 
            { "inputs": [ { "internalType": "uint256", "name": "_idade", "type": "uint256" } ], "name": "setIdade", "outputs": [], "stateMutability": "nonpayable", "type": "function" } 
        ];
        
        const endereco = '0x169648001447d9Cf04d8cb6F881F09b13082AaAC';

        // Inicializar Web3 apenas se provider existir
        if (provider) {
            var web3 = new Web3(provider);
            var contrato = new web3.eth.Contract(abi, endereco);
        }

        async function run() {
            // Para ver se a MetaMask está instalada
            if(!provider) {
                document.getElementById('conectar').innerHTML = 'Por favor, instale a MetaMask';
                return;
            }
            
            // Para ver se alguma conta está conectada
            try {
                const contas = await provider.request({method: 'eth_accounts'});
                
                if(contas.length == 0) {
                    document.getElementById('btnConectar').style.display = 'block';
                    document.getElementById('btnConectar').addEventListener('click', conectarMM);
                } else {
                    conta = contas[0];
                    document.getElementById('conectar').innerHTML = 'Conectado: ' + conta.substring(0, 6) + '...' + conta.substring(38);
                    await getName(); // Chamar a função para buscar o nome
                    document.getElementById('alterar').addEventListener('click', alteraNome);
                }
            } catch (error) {
                console.error('Erro ao verificar contas:', error);
            }
        }
        
        async function conectarMM() {
            try {
                const contas = await provider.request({method: 'eth_requestAccounts'});
                conta = contas[0];
                document.getElementById('conectar').innerHTML = 'Conectado: ' + conta.substring(0, 6) + '...' + conta.substring(38);
                document.getElementById('btnConectar').style.display = 'none';
                await getName(); // Buscar o nome após conectar
                document.getElementById('alterar').addEventListener('click', alteraNome);
            } catch (error) {
                console.error('Erro ao conectar:', error);
            }
        }

        async function getName() {
            try {
                // Corrigido: getName (com G maiúsculo no contrato) vs GetName (como estava)
                const nome = await contrato.methods.getName().call();
                document.getElementById('nome').innerHTML = 'Nome atual: ' + nome;
                console.log('Nome obtido:', nome);
            } catch (error) {
                console.error('Erro ao buscar nome:', error);
                document.getElementById('nome').innerHTML = 'Erro ao carregar nome';
            }
        }

        async function alteraNome() {
            try {
                if (!conta) {
                    alert('Conecte-se primeiro ao MetaMask!');
                    return;
                }

                const novoNome = document.getElementById('inputName').value;
                
                if (!novoNome) {
                    alert('Digite um nome!');
                    return;
                }

                console.log('Alterando nome para:', novoNome);
                
                // Corrigido: passar o parâmetro _name e a conta no from
                const recibo = await contrato.methods.setName(novoNome).send({ from: conta });
                
                console.log('Transação confirmada:', recibo);
                alert('Nome alterado com sucesso!');
                
                // Atualizar o nome exibido
                await getName();
                
            } catch (error) {
                console.error('Erro ao alterar nome:', error);
                alert('Erro ao alterar nome: ' + error.message);
            }
        }

        // Iniciar a aplicação
        run();

        // Removido o event listener incorreto que estava aqui
    </script>
</body>
</html>
